<?xml version="1.0" encoding="UTF-8"?>
<!-- Tecito mark — sage primary square + italic Newsreader "t" with the
     trailing dot, mirroring the Logo component (variant='mark') used
     across the app. scripts/generate-seo.mjs rasterizes this SVG into
     apple-touch-icon.png + icon-192.png + icon-512.png + favicon.ico,
     so updating this single file refreshes every place the brand mark
     surfaces (browser tab, iOS home screen, Android home screen, PWA
     splash, share previews). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#3B4A38"/>
  <text x="20" y="48"
        font-family="Newsreader, Georgia, serif"
        font-size="34"
        font-style="italic"
        font-weight="500"
        fill="#F5F2EC">t</text>
  <circle cx="42" cy="42" r="2.6" fill="#F5F2EC"/>
</svg>
